<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .orb1{animation:float1 9s ease-in-out infinite}
    .orb2{animation:float2 13s ease-in-out infinite}
    .orb3{animation:float3 16s ease-in-out infinite}
    .glow{animation:glow 3.5s ease-in-out infinite}
    .bline{animation:bline 5s linear infinite}
    @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(28px,-22px)}}
    @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,28px)}}
    @keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(22px,18px)}}
    @keyframes glow{
      0%,100%{filter:drop-shadow(0 0 18px rgba(167,139,250,.55))}
      50%{filter:drop-shadow(0 0 36px rgba(34,211,238,.75))}
    }
    @keyframes bline{from{stroke-dashoffset:0}to{stroke-dashoffset:-900}}
  </style>

  <radialGradient id="og1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#a78bfa" stop-opacity=".45"/>
    <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="og2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#22d3ee" stop-opacity=".38"/>
    <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="og3" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f472b6" stop-opacity=".36"/>
    <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="45%" stop-color="#22d3ee"/>
    <stop offset="100%" stop-color="#f472b6"/>
  </linearGradient>
  <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
    <stop offset="20%" stop-color="#a78bfa"/>
    <stop offset="50%" stop-color="#22d3ee"/>
    <stop offset="80%" stop-color="#f472b6"/>
    <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>

  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="1" fill="#fff" fill-opacity=".045"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="900" height="280" fill="#0d0a18"/>
<rect width="900" height="280" fill="url(#dots)"/>

<!-- Gradient vignette -->
<radialGradient id="vig" cx="50%" cy="50%" r="70%">
  <stop offset="0%" stop-color="#0d0a18" stop-opacity="0"/>
  <stop offset="100%" stop-color="#0d0a18" stop-opacity=".5"/>
</radialGradient>
<rect width="900" height="280" fill="url(#vig)"/>

<!-- Orbs -->
<g class="orb1"><ellipse cx="155" cy="95" rx="190" ry="165" fill="url(#og1)"/></g>
<g class="orb2"><ellipse cx="760" cy="155" rx="210" ry="180" fill="url(#og2)"/></g>
<g class="orb3"><ellipse cx="450" cy="295" rx="230" ry="130" fill="url(#og3)"/></g>

<!-- Logo mark (diamond) -->
<g transform="translate(450,62)">
  <!-- outer diamond -->
  <polygon points="0,-26 26,0 0,26 -26,0"
           fill="none" stroke="url(#dg)" stroke-width="1.5" opacity=".75"/>
  <!-- corner ticks -->
  <line x1="-26" y1="0" x2="-18" y2="0" stroke="#22d3ee" stroke-width="1.5" opacity=".55"/>
  <line x1="26" y1="0" x2="18" y2="0" stroke="#22d3ee" stroke-width="1.5" opacity=".55"/>
  <line x1="0" y1="-26" x2="0" y2="-18" stroke="#a78bfa" stroke-width="1.5" opacity=".55"/>
  <line x1="0" y1="26" x2="0" y2="18" stroke="#a78bfa" stroke-width="1.5" opacity=".55"/>
  <!-- inner diamond -->
  <polygon points="0,-14 14,0 0,14 -14,0"
           fill="none" stroke="url(#dg)" stroke-width="1" opacity=".35"/>
  <!-- center -->
  <circle cx="0" cy="0" r="3.5" fill="url(#dg)"/>
</g>

<!-- Title -->
<text class="glow"
      x="450" y="148"
      text-anchor="middle"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
      font-size="54"
      font-weight="800"
      letter-spacing="-2"
      fill="url(#tg)">AuraDKit</text>

<!-- Subtitle -->
<text x="450" y="176"
      text-anchor="middle"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
      font-size="13"
      font-weight="400"
      letter-spacing="2.5"
      fill="#8b89a8">DESIGN INTELLIGENCE ENGINE  ·  v5.0.1</text>

<!-- Stats pills — centers at x: 150, 300, 450, 600, 750 -->

<!-- 126 Sites -->
<g transform="translate(150,224)">
  <rect x="-55" y="-14" width="110" height="28" rx="14"
        fill="#a78bfa" fill-opacity=".1" stroke="#a78bfa" stroke-opacity=".3" stroke-width="1"/>
  <text text-anchor="middle" y="5"
        font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif"
        font-size="12.5" font-weight="700" fill="#a78bfa">126 Sites</text>
</g>

<!-- 7 Axes -->
<g transform="translate(300,224)">
  <rect x="-55" y="-14" width="110" height="28" rx="14"
        fill="#22d3ee" fill-opacity=".1" stroke="#22d3ee" stroke-opacity=".3" stroke-width="1"/>
  <text text-anchor="middle" y="5"
        font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif"
        font-size="12.5" font-weight="700" fill="#22d3ee">7 Axes</text>
</g>

<!-- 7.1/10 Avg -->
<g transform="translate(450,224)">
  <rect x="-55" y="-14" width="110" height="28" rx="14"
        fill="#34d399" fill-opacity=".1" stroke="#34d399" stroke-opacity=".3" stroke-width="1"/>
  <text text-anchor="middle" y="5"
        font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif"
        font-size="12.5" font-weight="700" fill="#34d399">7.1/10 Avg</text>
</g>

<!-- Drift 22 -->
<g transform="translate(600,224)">
  <rect x="-55" y="-14" width="110" height="28" rx="14"
        fill="#fb923c" fill-opacity=".1" stroke="#fb923c" stroke-opacity=".3" stroke-width="1"/>
  <text text-anchor="middle" y="5"
        font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif"
        font-size="12.5" font-weight="700" fill="#fb923c">Drift 22/100</text>
</g>

<!-- AI-Slop 7 -->
<g transform="translate(750,224)">
  <rect x="-55" y="-14" width="110" height="28" rx="14"
        fill="#f472b6" fill-opacity=".1" stroke="#f472b6" stroke-opacity=".3" stroke-width="1"/>
  <text text-anchor="middle" y="5"
        font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif"
        font-size="12.5" font-weight="700" fill="#f472b6">AI-Slop 7/100</text>
</g>

<!-- Bottom animated gradient line -->
<line x1="0" y1="278" x2="900" y2="278"
      stroke="url(#lg)" stroke-width="2"
      stroke-dasharray="35 20"
      class="bline"/>
</svg>
